<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulWM - Documentation</title>
    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Core Toolkit CSS -->
    <link rel="stylesheet" href="tulwm.css">
    
    <!-- App Specific Demo CSS -->
    <style>
        body {
            display: flex;
            height: 100vh;
        }

        /* Sidebar demo styling */
        .app-sidebar {
            width: 280px;
            background: var(--tulwm-bg-panel);
            border-right: 1px solid var(--tulwm-border);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 200;
            backdrop-filter: blur(var(--tulwm-blur));
            -webkit-backdrop-filter: blur(var(--tulwm-blur));
            box-shadow: 0 0 40px var(--tulwm-shadow-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .app-sidebar h1 {
            font-size: 22px;
            color: var(--tulwm-accent);
            margin: 0 0 8px 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .app-sidebar h2 {
            font-size: 11px;
            color: var(--tulwm-text-secondary);
            margin: 0 0 16px 0;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .sidebar-item-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item {
            background: transparent;
            border: 1px solid transparent;
            padding: 8px 12px;
            border-radius: var(--tulwm-radius-inner);
            color: var(--tulwm-text-secondary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sidebar-item:hover {
            background: var(--tulwm-bg-tab);
            border-color: var(--tulwm-border);
            color: var(--tulwm-text-primary);
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--tulwm-shadow-color);
        }

        .sidebar-item svg {
            flex-shrink: 0;
            opacity: 0.7;
        }
        
        .sidebar-item:hover svg {
            opacity: 1;
            color: var(--tulwm-accent);
        }

        /* Container for Layout Manager */
        #layout-container {
            flex-grow: 1;
            position: relative;
            padding: 16px;
            background: transparent;
            min-width: 0;
            min-height: 0;
        }

        .nav-links {
            margin-top: auto;
            border-top: 1px solid var(--tulwm-border);
            padding-top: 20px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--tulwm-accent);
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.2s;
        }

        .nav-link:hover {
            opacity: 0.8;
            transform: translateX(-4px);
        }

        /* Custom scrollbar for sidebar */
        .app-sidebar-scroll {
            overflow-y: auto;
            flex-grow: 1;
            margin-right: -10px;
            padding-right: 10px;
        }

        .app-sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .app-sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body class="theme-nordic">

    <!-- Sidebar with Drag Sources -->
    <div class="app-sidebar">
        <div>
            <h1>TulWM Docs</h1>
            <p style="color: var(--tulwm-text-secondary); font-size: 13px; margin: 0; line-height: 1.4;">Drag chapters into the workspace to read side-by-side.</p>
        </div>
        
        <div class="app-sidebar-scroll">
            <div style="margin-bottom: 24px;">
                <h2>Core Concepts</h2>
                <div class="sidebar-item-container">
                    <div class="sidebar-item" data-topic="intro">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        Introduction
                    </div>
                    <div class="sidebar-item" data-topic="architecture">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        Architecture
                    </div>
                    <div class="sidebar-item" data-topic="dnd">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M16 12l-4-4-4 4M12 8v8"></path></svg>
                        Drag & Drop
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 24px;">
                <h2>API Reference</h2>
                <div class="sidebar-item-container">
                    <div class="sidebar-item" data-topic="layoutManager">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        LayoutManager
                    </div>
                    <div class="sidebar-item" data-topic="components">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        Components
                    </div>
                    <div class="sidebar-item" data-topic="events">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                        Events & Shortcuts
                    </div>
                </div>
            </div>

            <div>
                <h2>Customization</h2>
                <div class="sidebar-item-container">
                    <div class="sidebar-item" data-topic="theming">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        Theming Engine
                    </div>
                </div>
            </div>
        </div>

        <div>
            <h2>Select Theme</h2>
            <select id="theme-selector" style="width: 100%; padding: 10px; background: var(--tulwm-bg-tab); color: var(--tulwm-text-primary); border: 1px solid var(--tulwm-border); border-radius: var(--tulwm-radius-inner); font-family: inherit; font-size: 13px; outline: none; cursor: pointer; transition: all 0.2s;">
                <option value="theme-nordic">Industrial Graphite</option>
                <option value="theme-cyber">Phosphor Terminal</option>
                <option value="theme-light">Pro Light</option>
            </select>
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Workspace
            </a>
        </div>
    </div>

    <!-- Main Workspace Area -->
    <div id="layout-container"></div>

    <!-- Load Engine and Docs App -->
    <script src="tulwm.js"></script>
    <script src="docs.js"></script>
</body>
</html>
