<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulWEB - Documentation</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Core Toolkit CSS -->
    <link rel="stylesheet" href="tulweb.css">

    <!-- App Specific Demo CSS -->
    <style>
        body {
            display: flex;
            height: 100vh;
        }

        /* Sidebar demo styling */
        .app-sidebar {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            height: 100%;
        }

        .app-sidebar h1 {
            font-size: 22px;
            color: var(--tulweb-accent);
            margin: 0 0 8px 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .app-sidebar h2 {
            font-size: 11px;
            color: var(--tulweb-text-secondary);
            margin: 0 0 16px 0;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .sidebar-item-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item {
            background: transparent;
            border: 1px solid transparent;
            padding: 8px 12px;
            border-radius: var(--tulweb-radius-inner);
            color: var(--tulweb-text-secondary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sidebar-item:hover {
            background: var(--tulweb-bg-tab);
            border-color: var(--tulweb-border);
            color: var(--tulweb-text-primary);
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--tulweb-shadow-color);
        }

        .sidebar-item svg {
            flex-shrink: 0;
            opacity: 0.7;
        }

        .sidebar-item:hover svg {
            opacity: 1;
            color: var(--tulweb-accent);
        }

        /* Container for Layout Manager */
        #layout-container {
            flex-grow: 1;
            position: relative;
            padding: 16px;
            background: transparent;
            min-width: 0;
            min-height: 0;
        }

        .nav-links {
            margin-top: auto;
            border-top: 1px solid var(--tulweb-border);
            padding-top: 20px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--tulweb-accent);
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.2s;
        }

        .nav-link:hover {
            opacity: 0.8;
            transform: translateX(-4px);
        }

        /* Custom scrollbar for sidebar */
        .app-sidebar-scroll {
            overflow-y: auto;
            flex-grow: 1;
            margin-right: -10px;
            padding-right: 10px;
        }

        .app-sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .app-sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 4px;
        }
    </style>
</head>

<body class="theme-nordic">

    <!-- Main Workspace Area -->
    <div id="layout-container" style="width: 100vw; height: 100vh;"></div>

    <!-- Load Engine and Docs App -->
    <script src="tulweb.js"></script>
    <script src="docs.js"></script>
</body>

</html>
