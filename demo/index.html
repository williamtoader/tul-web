<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TulWEB - Pure JS Windowing Toolkit</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Core Toolkit CSS -->
    <link rel="stylesheet" href="../src/tulweb.css">

    <!-- Demo App CSS -->
    <link rel="stylesheet" href="app.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <link rel="apple-touch-icon" href="../assets/icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('SW Registered', reg);
                        // Check for updates every time the page is loaded
                        reg.update();
                    })
                    .catch(err => console.log('SW Registration Failed', err));
            });

            // Listen for the new service worker taking control
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                console.log('SW: New version activated, reloading page...');
                window.location.reload();
            });
        }
    </script>


</head>

<body class="theme-nordic">

<!-- Main Workspace Area -->
<div id="layout-container" style="width: 100vw; height: 100vh;"></div>

<script type="module" src="app.js"></script>
</body>

</html>
